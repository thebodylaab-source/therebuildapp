services:
  - type: web
    name: therebuild
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install -g bun && bun install && cd packages/web && bun run build
    startCommand: cd packages/web && bun src/server.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: WEBSITE_URL
        value: https://www.therebuild.eu
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_AUTH_TOKEN
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: AI_GATEWAY_BASE_URL
        sync: false
      - key: AI_GATEWAY_API_KEY
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: AUTUMN_SECRET_KEY
        sync: false
